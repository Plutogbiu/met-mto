# 服务端基础配置
server:
  port: 8080

spring:
  application:
    name: mto-server
  datasource:
    url: jdbc:mysql://localhost:3306/mto?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000ms

# MyBatis-Plus 基础配置
mybatis-plus:
  type-aliases-package: com.met.mto.entity
  global-config:
    db-config:
      id-type: auto
      table-prefix: ""
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 项目业务配置
mto:
  storage:
    local-path: D:/workspace/met-mto/uploads
  map:
    tencent:
      # 腾讯地图 Key，用于客户选址、后续导航和打卡定位
      key: "7YGBZ-2EAKN-7AKFD-SLRNN-4H7EH-L3FVO"
      referer: "MET-MTO"
  auth:
    # 后台管理端会话有效期，降低管理端长期登录风险
    admin-token-expire-minutes: 30
    # 现场 App 会话有效期，减少现场工程师重复登录
    app-token-expire-days: 7
    jwt-secret: met-mto-local-development-secret-key-please-change-before-prod

